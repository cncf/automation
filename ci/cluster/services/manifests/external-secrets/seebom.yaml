apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: seebom-secret
  namespace: seebom
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: oci-secret-store
  target:
    name: seebom-secret
    creationPolicy: Owner
  dataFrom:
  - extract:
      key: seebom-secret
