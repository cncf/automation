apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: lfx-oidc-client-credentials
  namespace: auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: oci-secret-store
  target:
    name: lfx-oidc-client-credentials
    creationPolicy: Owner
  dataFrom:
  - extract:
      key: lfx-oidc-client-credentials
