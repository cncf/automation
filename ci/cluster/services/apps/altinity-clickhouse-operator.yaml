apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: clickhouse-altinity-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "25"
    notifications.argoproj.io/subscribe.slack: internal-gha-argo
  labels:
    cluster: oke-cncf-automation
spec:
  project: default
  source:
    repoURL: https://helm.altinity.com
    chart: altinity-clickhouse-operator
    targetRevision: 0.26.0
    helm:
      values: |
        fullnameOverride: clickhouse-altinity-operator
        files:
          watch:
            namespaces: ["clickhouse-altinity", "seebom"]
        serviceMonitor:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: clickhouse-altinity
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
