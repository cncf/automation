apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gha-runner-scale-set-controller
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.slack: internal-gha-argo
  labels:
    cluster: lke-gha-iad2
spec:
  project: default
  destination:
    server: "https://kubernetes.default.svc"
    namespace: arc-systems
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
  - repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set-controller
    targetRevision: 0.14.1
    helm:
      releaseName: cncf
      valueFiles:
        - $values/ci/cluster/lke-gha-iad2/manifests/gha-runner-scale-set-controller-values.yaml
  - ref: values
    repoURL: https://github.com/cncf/automation.git
    targetRevision: main
