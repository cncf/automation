name: Validate Maintainers

on:
  pull_request:
    paths:
      - 'utilities/dot-project/example/maintainers.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: utilities/dot-project/go.mod

      - name: Build Validator
        run: |
          cd utilities/dot-project
          go build -o validator cmd/validator/main.go

      - name: Get Base Maintainers File
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git show "origin/${BASE_REF}:utilities/dot-project/example/maintainers.yaml" > utilities/dot-project/example/maintainers-base.yaml || echo "No base file found"

      - name: Validate Maintainers
        env:
          LFX_AUTH_TOKEN: ${{ secrets.LFX_AUTH_TOKEN }}
        run: |
          cd utilities/dot-project
          if [ -f example/maintainers-base.yaml ]; then
            ./validator -config example/projectlist.yaml -maintainers example/maintainers.yaml -base-maintainers example/maintainers-base.yaml -verify-maintainers
          else
            ./validator -config example/projectlist.yaml -maintainers example/maintainers.yaml -verify-maintainers
          fi
