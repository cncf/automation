name: Change File Build New Actions ARM VM
on:
  push:
    branches:
      - "main"
    paths:
        - "ci/gha-runner-vm/**"
        - ".github/workflows/change-file-build-new-actions-arm-vm.yml"
        - ".github/workflows/periodic-build-new-actions-arm-vm.yml"
        - ".github/scripts/create_bare_metal.sh"
        - ".github/scripts/build_arm_image.sh"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

env:
  OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
  OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
  COMPARTMENT_ID: ocid1.compartment.oc1..aaaaaaaa22icap66vxktktubjlhf6oxvfhev6n7udgje2chahyrtq65ga63a

jobs:
  build:
    name: Build new Actions arm64 VM
    runs-on: oracle-2cpu-8gb-x86-64
    outputs:
      image_id: ${{ steps.build_image.outputs.image_id }}
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Change Ubuntu mirrors
        uses: vegardit/fast-apt-mirror.sh@c02f624f2c4108687b16f980a2c9e10d82bdace6 # v1.4.4
        with:
          exclude-current: true

      - name: Install OCI CLI
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          pip-install: oci-cli

      - name: Create Arm64 BareMetal Instance
        run: |
          ${{ github.workspace }}/.github/scripts/create_bare_metal.sh
          cat ${{ github.workspace }}/.env >> $GITHUB_ENV
        shell: bash

      - name: Build VM Image
        id: build_image
        run: |
          set -euo pipefail
          CREDS_FILE=$(mktemp)
          cat > "$CREDS_FILE" <<CREDEOF
          OCI_CLI_USER=${OCI_CLI_USER}
          OCI_CLI_TENANCY=${OCI_CLI_TENANCY}
          OCI_CLI_FINGERPRINT=${OCI_CLI_FINGERPRINT}
          OCI_CLI_KEY_CONTENT=$(echo "${OCI_CLI_KEY_CONTENT}" | base64 -w0)
          OCI_CLI_REGION=${OCI_CLI_REGION}
          CREDEOF
          scp -i ${{ github.workspace }}/id_rsa "$CREDS_FILE" ubuntu@$PUBLIC_IP:oci_credentials.env
          scp -i ${{ github.workspace }}/id_rsa ${{ github.workspace }}/.github/scripts/build_arm_image.sh ubuntu@$PUBLIC_IP:.
          shred -u "$CREDS_FILE"
          ssh -o ServerAliveInterval=60 -i ${{ github.workspace }}/id_rsa ubuntu@$PUBLIC_IP -- ./build_arm_image.sh
          scp -i ${{ github.workspace }}/id_rsa ubuntu@$PUBLIC_IP:/tmp/image_ocid .
          scp -i ${{ github.workspace }}/id_rsa ubuntu@$PUBLIC_IP:/tmp/object_name .
          scp -i ${{ github.workspace }}/id_rsa ubuntu@$PUBLIC_IP:/tmp/image_tag .
        shell: bash

      - name: Upload image OCID
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-ocid
          path: ./image_ocid

      - name: Upload object name
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: object-name
          path: ./object_name

      - name: Upload image tag
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-tag
          path: ./image_tag

      - name: Terminate Arm64 BareMetal Instance
        if: always()
        run: |
          set -euo pipefail
          if [ -n "${INSTANCE_OCID:-}" ]; then
            # REGION and INSTANCE_OCID are set in .env by create_bare_metal.sh
            oci compute instance terminate --instance-id "$INSTANCE_OCID" --force --region $REGION
          else
            echo "No INSTANCE_OCID set, skipping termination"
          fi
        shell: bash

  run-kind-with-arc:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Start kind cluster
        run: |
          cat <<EOF > kind-config.yaml
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
          - role: control-plane
            image: kindest/node:v1.34.3@sha256:08497ee19eace7b4b5348db5c6a1591d7752b164530a36f855cb0f2bdcbadd48
          - role: worker
            image: kindest/node:v1.34.3@sha256:08497ee19eace7b4b5348db5c6a1591d7752b164530a36f855cb0f2bdcbadd48
          EOF

          kind create cluster --config kind-config.yaml

          kubectl wait --for=condition=Ready nodes --all --timeout=120s

          helm install cncf-gha-controller \
            --namespace arc-systems \
            --create-namespace \
            --version 0.11.0 \
            oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set-controller

          kubectl wait --for=condition=Ready pod -l app.kubernetes.io/component=controller-manager --timeout=600s -n arc-systems

          kubectl create secret generic oci-api-key --from-literal=oci_api_key.pem="${{ secrets.OCI_CLI_KEY_CONTENT }}" -n arc-systems

          kubectl create secret generic github-arc-secret --from-literal=github_token=${{ secrets.GHA_PAT }} -n arc-systems

          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: oci-config
            namespace: arc-systems
          type: Opaque
          stringData:
            config: |
              [DEFAULT]
              user=${{ secrets.OCI_CLI_USER }}
              fingerprint=${{ secrets.OCI_CLI_FINGERPRINT }}
              tenancy=${{ secrets.OCI_CLI_TENANCY }}
              region=${{ secrets.OCI_CLI_REGION }}
              key_file=/oci/oci_api_key.pem
          EOF

          sed 's/oracle-vm-2cpu-8gb/oci-ci-test/g' ci/cluster/oci/vm-runners/2cpu-8gb-arm64/install.yaml \
            | sed '/subnet-id/a \        - --running-environment=ci' \
            | sed '/nodeSelector/,+1d'| kubectl apply -f -

      - name: Wait for completion signal
        run: |
          while true; do
            if ! RESULT=$(gh api repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs); then
              echo "WARNING: gh api call failed, retrying..."
              sleep 30
              continue
            fi

            PENDING=$(echo "$RESULT" | jq '[.jobs[] | select(.name != "run-kind-with-arc" and .status != "completed")] | length')
            FAILED=$(echo "$RESULT" | jq '[.jobs[] | select(.conclusion == "failure")] | length')

            if [ "$FAILED" -gt 0 ]; then
              echo "ERROR: $FAILED job(s) failed"
              exit 1
            fi

            if [ "$PENDING" -eq 0 ]; then
              echo "All jobs completed"
              break
            fi

            echo "There are $PENDING pending jobs..."
            sleep 30
          done

          kind delete cluster
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}

  test-runner:
    runs-on: oci-ci-test-arm64
    needs: build
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Update APT
        run: |
          sudo apt-get update
          sudo apt-get install -y mc

      - name: Run uname to verify architecture
        run: |
          uname -a
          lsb_release -a
          cat /proc/cpuinfo

      - name: Run kind cluster
        run: ${{ github.workspace }}/.github/scripts/test_with_kind_cluster.sh

  release-new-image:
    runs-on: ubuntu-latest
    needs: [run-kind-with-arc, test-runner]
    steps:
      - name: Download image OCID
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: image-ocid

      - name: Install OCI CLI
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          pip-install: oci-cli

      - name: Release
        run: |
          IMAGE_ID=$(cat image_ocid)
          oci compute image update --image-id ${IMAGE_ID} --operating-system ubuntu-24.04-arm64-gha-image --display-name ubuntu-24.04-arm64-gha-image

  import-image-ashburn:
    runs-on: ubuntu-latest
    needs: release-new-image
    env:
      OS_NAME: ubuntu-24.04-arm64-gha-image
      BUCKET_NAMESPACE: axtwf1hkrwcy
      BUCKET_NAME: bucket-20250428-1925
      REGION: us-ashburn-1
    steps:
      - name: Download image OCID
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: object-name

      - name: Download image tag
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: image-tag

      - name: Install OCI CLI
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          pip-install: oci-cli

      - name: Import Custom Image on Ashburn
        run: |
          OBJECT_NAME=$(cat object_name)
          IMAGE_TAG=$(cat image_tag)
          IMAGE_ID=$(oci compute image import from-object \
            --bucket-name ${{ env.BUCKET_NAME }} \
            --compartment-id ${{ env.COMPARTMENT_ID }} \
            --namespace ${{ env.BUCKET_NAMESPACE }} \
            --operating-system ${{ env.OS_NAME }} \
            --display-name ${{ env.OS_NAME }} \
            --name ${OBJECT_NAME} \
            --operating-system-version ${IMAGE_TAG} \
            --launch-mode PARAVIRTUALIZED \
            --region ${{ env.REGION }} \
            --query 'data.id' --raw-output)
          while true; do
            STATUS=$(oci compute image get --image-id ${IMAGE_ID} --region ${{ env.REGION }} --query 'data."lifecycle-state"' --raw-output)
            echo "Image import status: $STATUS"
            if [ "$STATUS" == "AVAILABLE" ]; then
              echo "Image import completed"
              break
            elif [ "$STATUS" == "FAILED" ]; then
              echo "Image import failed"
              exit 1
            else
              echo "Waiting for image import to complete..."
              sleep 30
            fi
          done
          echo "IMAGE_ID=${IMAGE_ID}" >> $GITHUB_ENV

      - name: Enable VM.Standard.A1.Flex in Ashburn and update image capabilities
        run: |
          set -euo pipefail
          export OCI_CONFIG_FILE="${{ github.workspace }}/.oci/config"
          export OCI_CLI_KEY_FILE="${{ github.workspace }}/.oci/oci_api_key.pem"
          mkdir -p ${{ github.workspace }}/.oci
          cat > ${OCI_CONFIG_FILE} << EOF
          [DEFAULT]
          user=${{ secrets.OCI_CLI_USER }}
          fingerprint=${{ secrets.OCI_CLI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_CLI_TENANCY }}
          region=${{ secrets.OCI_CLI_REGION }}
          key_file=${OCI_CLI_KEY_FILE}
          EOF

          echo "${{ secrets.OCI_CLI_KEY_CONTENT }}" > ${OCI_CLI_KEY_FILE}

          chmod 600 ${OCI_CONFIG_FILE}
          chmod 600 ${OCI_CLI_KEY_FILE}

          oci raw-request --http-method PUT \
            --config-file ${OCI_CONFIG_FILE} \
            --target-uri https://iaas.us-ashburn-1.oraclecloud.com/20160918/images/${IMAGE_ID}/shapes/VM.Standard.A1.Flex \
            --request-body "{\"imageId\":\"${IMAGE_ID}\",\"shape\":\"VM.Standard.A1.Flex\"}"

          oci raw-request --http-method PUT \
            --config-file ${OCI_CONFIG_FILE} \
            --target-uri https://iaas.us-ashburn-1.oraclecloud.com/20160918/images/${IMAGE_ID}/shapes/VM.Standard.A2.Flex \
            --request-body "{\"imageId\":\"${IMAGE_ID}\",\"shape\":\"VM.Standard.A2.Flex\"}"

          oci raw-request --http-method PUT \
            --config-file ${OCI_CONFIG_FILE} \
            --target-uri https://iaas.us-ashburn-1.oraclecloud.com/20160918/images/${IMAGE_ID}/shapes/VM.Standard.A4.Flex \
            --request-body "{\"imageId\":\"${IMAGE_ID}\",\"shape\":\"VM.Standard.A4.Flex\"}"

          oci raw-request --http-method POST \
            --config-file ${OCI_CONFIG_FILE} \
            --target-uri https://iaas.us-ashburn-1.oraclecloud.com/20160918/computeImageCapabilitySchemas \
            --request-body "{\"schemaData\":{\"Compute.Firmware\":{\"values\":[\"BIOS\",\"UEFI_64\"],\"defaultValue\":\"UEFI_64\",\"source\":\"IMAGE\",\"descriptorType\":\"enumstring\"},\"Compute.LaunchMode\":{\"values\":[\"PARAVIRTUALIZED\"],\"defaultValue\":\"PARAVIRTUALIZED\",\"source\":\"IMAGE\",\"descriptorType\":\"enumstring\"},\"Compute.AMD_SecureEncryptedVirtualization\":{\"defaultValue\":\"false\",\"source\":\"IMAGE\",\"descriptorType\":\"boolean\"},\"Compute.SecureBoot\":{\"defaultValue\":\"false\",\"source\":\"IMAGE\",\"descriptorType\":\"boolean\"},\"Network.AttachmentType\":{\"values\":[\"PARAVIRTUALIZED\"],\"defaultValue\":\"PARAVIRTUALIZED\",\"source\":\"IMAGE\",\"descriptorType\":\"enumstring\"},\"Network.IPv6Only\":{\"defaultValue\":\"false\",\"source\":\"IMAGE\",\"descriptorType\":\"boolean\"},\"Storage.BootVolumeType\":{\"values\":[\"ISCSI\",\"PARAVIRTUALIZED\"],\"defaultValue\":\"PARAVIRTUALIZED\",\"source\":\"IMAGE\",\"descriptorType\":\"enumstring\"},\"Storage.LocalDataVolumeType\":{\"values\":[\"ISCSI\",\"PARAVIRTUALIZED\"],\"defaultValue\":\"PARAVIRTUALIZED\",\"source\":\"IMAGE\",\"descriptorType\":\"enumstring\"},\"Storage.RemoteDataVolumeType\":{\"values\":[\"ISCSI\",\"PARAVIRTUALIZED\"],\"defaultValue\":\"PARAVIRTUALIZED\",\"source\":\"IMAGE\",\"descriptorType\":\"enumstring\"},\"Storage.ConsistentVolumeNaming\":{\"defaultValue\":\"true\",\"source\":\"IMAGE\",\"descriptorType\":\"boolean\"},\"Storage.Iscsi.MultipathDeviceSupported\":{\"defaultValue\":\"false\",\"source\":\"IMAGE\",\"descriptorType\":\"boolean\"},\"Storage.ParaVirtualization.EncryptionInTransit\":{\"defaultValue\":\"true\",\"source\":\"IMAGE\",\"descriptorType\":\"boolean\"},\"Storage.ParaVirtualization.AttachmentVersion\":{\"values\":[\"1\",\"2\"],\"defaultValue\":\"2\",\"source\":\"IMAGE\",\"descriptorType\":\"enuminteger\"}},\"imageId\":\"${IMAGE_ID}\",\"compartmentId\":\"${COMPARTMENT_ID}\",\"computeGlobalImageCapabilitySchemaVersionName\":\"34dd2cea-aff2-4f45-b8f6-1cb5290bfab2\"}"
