name: Periodic Build New Actions VM

on:
  schedule:
    - cron: "0 0 * * *"

permissions:
  actions: read
  contents: read

jobs:
  build:
    name: Build new Actions VM
    runs-on: oracle-vm-8cpu-32gb-x86-64
    env:
      PACKER_VERSION: 1.14.3
    outputs:
      image_exists: ${{ steps.check_latest.outputs.image_exists }}
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ci/gha-runner-vm/go.mod

      - name: Install OCI CLI
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          pip-install: oci-cli

      - name: Verify OCI CLI
        env:
          OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
        run: oci compute image list --compartment-id ocid1.compartment.oc1..aaaaaaaa22icap66vxktktubjlhf6oxvfhev6n7udgje2chahyrtq65ga63a --operating-system runner-images --operating-system-version 123456

      - name: Check latest release
        id: check_latest
        env:
          OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT  }}
          OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
        run: |
          set -euo pipefail
          LATEST_RELEASE=$(curl -fsSL "https://api.github.com/repos/actions/runner-images/releases?per_page=100" | jq -r '.[] | select(.prerelease == false) | select(.name | startswith("Ubuntu 24.04")) | .tag_name' | head -1)
          IMAGE_EXISTS=$(oci compute image list --compartment-id ocid1.compartment.oc1..aaaaaaaa22icap66vxktktubjlhf6oxvfhev6n7udgje2chahyrtq65ga63a --operating-system "ubuntu-24.04-amd64-gha-image" --operating-system-version ${LATEST_RELEASE})
          if [ -z "$IMAGE_EXISTS" ]; then
            echo "image_exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "image_exists=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Change Ubuntu mirrors
        if: steps.check_latest.outputs.image_exists == 'false'
        uses: vegardit/fast-apt-mirror.sh@29a5ef3401107220fc3c32a0c659b6a1211f9e0f # v1.4.2
        with:
          exclude-current: true

      - name: Set up QEMU
        if: steps.check_latest.outputs.image_exists == 'false'
        run : |
          sudo apt install qemu-system-x86 xorriso
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install dependencies
        if: steps.check_latest.outputs.image_exists == 'false'
        run: cd ci/gha-runner-vm && go get .

      - name: Install Packer
        if: steps.check_latest.outputs.image_exists == 'false'
        run: |
          curl -LO https://releases.hashicorp.com/packer/${{ env.PACKER_VERSION }}/packer_${{ env.PACKER_VERSION }}_linux_amd64.zip
          unzip packer_${{ env.PACKER_VERSION }}_linux_amd64.zip
          sudo mv packer /usr/local/bin/
          rm packer_${{ env.PACKER_VERSION }}_linux_amd64.zip
          export PACKER_PLUGIN_PATH=/home/ubuntu/.config/packer/plugins
          packer plugins install github.com/hashicorp/oracle
          packer plugins install github.com/hashicorp/qemu

      - name: Build VM Images
        if: steps.check_latest.outputs.image_exists == 'false'
        id: build_image
        run: |
          set -euo pipefail
          export OCI_CONFIG_FILE="/home/ubuntu/.oci/config"
          export OCI_KEY_FILE="/home/ubuntu/.oci/oci_api_key.pem"
          mkdir /home/ubuntu/.oci

          cat > ${OCI_CONFIG_FILE} << EOF
          [DEFAULT]
          user=${{ secrets.OCI_CLI_USER }}
          fingerprint=${{ secrets.OCI_CLI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_CLI_TENANCY }}
          region=${{ secrets.OCI_CLI_REGION }}
          key_file=${OCI_KEY_FILE}
          EOF

          echo "${{ secrets.OCI_CLI_KEY_CONTENT }}" > ${OCI_KEY_FILE}

          chmod 600 ${OCI_CONFIG_FILE}
          chmod 600 ${OCI_KEY_FILE}

          export PATH="$PATH:$HOME/.local/bin" && \
          export PACKER_PLUGIN_PATH=/home/ubuntu/.config/packer/plugins && \
          cd ci/gha-runner-vm && \
          PACKER_LOG=1 GITHUB_PERIODIC=true go run main.go \
            --isoURL https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img \
            --arch amd64

      - name: Upload image OCID
        if: steps.check_latest.outputs.image_exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: image-ocid
          path: /tmp/image_ocid

  run-kind-with-arc:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.image_exists == 'false'
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Start kind cluster
        run: |
          cat <<EOF > kind-config.yaml
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
          - role: control-plane
            image: kindest/node:v1.34.3@sha256:08497ee19eace7b4b5348db5c6a1591d7752b164530a36f855cb0f2bdcbadd48
          - role: worker
            image: kindest/node:v1.34.3@sha256:08497ee19eace7b4b5348db5c6a1591d7752b164530a36f855cb0f2bdcbadd48
          EOF

          kind create cluster --config kind-config.yaml

          kubectl wait --for=condition=Ready nodes --all --timeout=120s

          helm install cncf-gha-controller \
            --namespace arc-systems \
            --create-namespace \
            --version 0.11.0 \
            oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set-controller

          kubectl wait --for=condition=Ready pod -l app.kubernetes.io/component=controller-manager --timeout=600s -n arc-systems

          kubectl create secret generic oci-api-key --from-literal=oci_api_key.pem="${{ secrets.OCI_CLI_KEY_CONTENT }}" -n arc-systems

          kubectl create secret generic github-arc-secret --from-literal=github_token=${{ secrets.GHA_PAT }} -n arc-systems

          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: oci-config
            namespace: arc-systems
          type: Opaque
          stringData:
            config: |
              [DEFAULT]
              user=${{ secrets.OCI_CLI_USER }}
              fingerprint=${{ secrets.OCI_CLI_FINGERPRINT }}
              tenancy=${{ secrets.OCI_CLI_TENANCY }}
              region=${{ secrets.OCI_CLI_REGION }}
              key_file=/oci/oci_api_key.pem
          EOF

          sed 's/oracle-vm-2cpu-8gb/oci-ci-test/g' ci/cluster/oci/vm-runners/2cpu-8gb/install.yaml \
            | sed '/subnet-id/a \        - --running-environment=ci' \
            | sed '/nodeSelector/,+1d'| kubectl apply -f -

      - name: Wait for completion signal
        run: |
          while true; do
            if ! RESULT=$(gh api repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs); then
              echo "WARNING: gh api call failed, retrying..."
              sleep 30
              continue
            fi

            PENDING=$(echo "$RESULT" | jq '[.jobs[] | select(.name != "run-kind-with-arc" and .status != "completed")] | length')
            FAILED=$(echo "$RESULT" | jq '[.jobs[] | select(.conclusion == "failure")] | length')

            if [ "$FAILED" -gt 0 ]; then
              echo "ERROR: $FAILED job(s) failed"
              exit 1
            fi

            if [ "$PENDING" -eq 0 ]; then
              echo "All jobs completed"
              break
            fi

            echo "There are $PENDING pending jobs..."
            sleep 30
          done

          kind delete cluster
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}

  test-runner:
    runs-on: oci-ci-test-x86-64
    needs: build
    if: needs.build.outputs.image_exists == 'false'
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Update APT
        run: |
          sudo apt-get update
          sudo apt-get install -y mc

      - name: Run uname to verify architecture
        run: |
          uname -a
          lsb_release -a
          cat /proc/cpuinfo

      - name: Run kind cluster
        run: ${{ github.workspace }}/.github/scripts/test_with_kind_cluster.sh

  release-new-image:
    runs-on: ubuntu-latest
    needs: [run-kind-with-arc, test-runner]
    env:
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
    steps:
      - name: Download image OCID
        uses: actions/download-artifact@v4
        with:
          name: image-ocid

      - name: Install OCI CLI
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          pip-install: oci-cli

      - name: Release
        run: |
          IMAGE_ID=$(cat image_ocid)
          oci compute image update --image-id ${IMAGE_ID} --operating-system ubuntu-24.04-amd64-gha-image --display-name ubuntu-24.04-amd64-gha-image
