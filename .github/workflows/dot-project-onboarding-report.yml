name: dot-project onboarding report

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 06:00 UTC
    - cron: '0 6 * * *'

permissions:
  contents: write

jobs:
  onboarding-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: utilities/dot-project/go.mod

      - name: Build onboarding-report
        working-directory: utilities/dot-project
        run: go build -o bin/onboarding-report ./cmd/onboarding-report

      - name: Generate onboarding report
        working-directory: utilities/dot-project
        env:
          GITHUB_TOKEN: ${{ secrets.ENTERPRISE_TOKEN }}
        run: |
          ./bin/onboarding-report \
            -enterprise cncf \
            -output ONBOARDED.md

      - name: Check for changes
        id: diff
        working-directory: utilities/dot-project
        run: |
          git diff --quiet ONBOARDED.md && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
          git add utilities/dot-project/ONBOARDED.md
          git commit -m "chore: update .project onboarding report [skip ci]"
          git push

