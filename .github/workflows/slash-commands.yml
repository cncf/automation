name: Slash Commands

on:
  issue_comment:
    types: [created, edited]

jobs:
  slash-command-dispatch:
    if: github.event.comment.body
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Dispatch slash commands
        uses: peter-evans/slash-command-dispatch@9bdcd7914ec1b75590b790b844aa3b8eee7c683a # v5
        with:
          token: ${{ secrets.SLASH_COMMANDS_PAT }}
          permission: write
          reactions: false
          commands: |
            kind
            priority
            status
            area
            help
            remove-kind
            remove-priority
            remove-status
            remove-area
            remove-help
