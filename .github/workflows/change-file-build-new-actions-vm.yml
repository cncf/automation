name: Change File Build New Actions VM
on:
  push:
    branches:
      - "main"
    paths:
        - "ci/gha-runner-vm/**"
        - "ci/gha-runner-vm-oci/**"
        - ".github/workflows/change-file-build-new-actions-vm.yml"
        - ".github/workflows/periodic-build-new-actions-vm.yml"

permissions:
  actions: read
  contents: read

env:
  OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
  OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
  COMPARTMENT_ID: ocid1.compartment.oc1..aaaaaaaa22icap66vxktktubjlhf6oxvfhev6n7udgje2chahyrtq65ga63a

jobs:
  build-x86:
    name: Build new Actions x86-64 VM
    runs-on: cncf-ubuntu-16-64-x86
    env:
      PACKER_VERSION: 1.14.3
    outputs:
      image_id: ${{ steps.build_image.outputs.image_id }}
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: ci/gha-runner-vm/go.mod
      - name: Change Ubuntu mirrors
        uses: vegardit/fast-apt-mirror.sh@806c59276adfff2df420124ad5e4587f018c358a # v1.4.5
        with:
          exclude-current: true
      - name: Set up QEMU
        run : |
          sudo apt install qemu-system-x86 xorriso qemu-system-arm qemu-efi-aarch64
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install dependencies
        run: cd ci/gha-runner-vm && go get .
      - name: Install Packer
        run: |
          curl -LO https://releases.hashicorp.com/packer/${{ env.PACKER_VERSION }}/packer_${{ env.PACKER_VERSION }}_linux_amd64.zip
          unzip packer_${{ env.PACKER_VERSION }}_linux_amd64.zip
          sudo mv packer /usr/local/bin/
          rm packer_${{ env.PACKER_VERSION }}_linux_amd64.zip
          export PACKER_PLUGIN_PATH=~/.config/packer/plugins
          packer plugins install github.com/hashicorp/oracle
          packer plugins install github.com/hashicorp/qemu

      - name: Install OCI CLI
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          pip-install: oci-cli

      - name: Verify OCI CLI
        run: oci compute image list --compartment-id ${{ env.COMPARTMENT_ID }} --operating-system runner-images --operating-system-version 123456

      - name: Build VM Images
        id: build_image
        run: |
          set -euo pipefail
          export OCI_CONFIG_FILE="${{ github.workspace }}/.oci/config"
          export OCI_CLI_KEY_FILE="${{ github.workspace }}/.oci/oci_api_key.pem"
          mkdir ${{ github.workspace }}/.oci

          cat > ${OCI_CONFIG_FILE} << EOF
          [DEFAULT]
          user=${{ secrets.OCI_CLI_USER }}
          fingerprint=${{ secrets.OCI_CLI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_CLI_TENANCY }}
          region=${{ secrets.OCI_CLI_REGION }}
          key_file=${OCI_CLI_KEY_FILE}
          EOF

          echo "${{ secrets.OCI_CLI_KEY_CONTENT }}" > ${OCI_CLI_KEY_FILE}

          chmod 600 ${OCI_CONFIG_FILE}
          chmod 600 ${OCI_CLI_KEY_FILE}

          export PATH=$PATH:$HOME/bin && \
          export PACKER_PLUGIN_PATH=~/.config/packer/plugins && \
          cd ci/gha-runner-vm && \
          PACKER_LOG=1 go run main.go \
            --isoURL https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img \
            --arch amd64

      - name: Upload image OCID
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-ocid-x86
          path: /tmp/image_ocid

      - name: Upload object name
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: object-name-x86
          path: /tmp/object_name

      - name: Upload image tag
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-tag-x86
          path: /tmp/image_tag

  build-arm64:
    name: Build new Actions ARM64 VM
    runs-on: cncf-c-ubuntu-2-8-x86
    env:
      PACKER_VERSION: 1.14.3
    outputs:
      image_id: ${{ steps.build_image.outputs.image_id }}
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: ci/gha-runner-vm-oci/go.mod

      - name: Change Ubuntu mirrors
        uses: vegardit/fast-apt-mirror.sh@806c59276adfff2df420124ad5e4587f018c358a # v1.4.5
        with:
          exclude-current: true

      - name: Install dependencies
        run: cd ci/gha-runner-vm-oci && go get .

      - name: Install Packer
        run: |
          curl -LO https://releases.hashicorp.com/packer/${{ env.PACKER_VERSION }}/packer_${{ env.PACKER_VERSION }}_linux_amd64.zip
          unzip packer_${{ env.PACKER_VERSION }}_linux_amd64.zip
          sudo mv packer /usr/local/bin/
          rm packer_${{ env.PACKER_VERSION }}_linux_amd64.zip
          export PACKER_PLUGIN_PATH=~/.config/packer/plugins
          packer plugins install github.com/hashicorp/oracle
          packer plugins install github.com/hashicorp/qemu

      - name: Install OCI CLI
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          pip-install: oci-cli

      - name: Verify OCI CLI
        run: oci compute image list --compartment-id ${{ env.COMPARTMENT_ID }} --operating-system runner-images --operating-system-version 123456

      - name: Build VM Images
        id: build_image
        run: |
          set -euo pipefail
          export OCI_CONFIG_FILE=~/.oci/config
          export OCI_CLI_KEY_FILE=~/.oci/oci_api_key.pem
          mkdir -p ~/.oci

          cat > ${OCI_CONFIG_FILE} << EOF
          [DEFAULT]
          user=${{ secrets.OCI_CLI_USER }}
          fingerprint=${{ secrets.OCI_CLI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_CLI_TENANCY }}
          region=${{ secrets.OCI_CLI_REGION }}
          key_file=${OCI_CLI_KEY_FILE}
          EOF

          echo "${{ secrets.OCI_CLI_KEY_CONTENT }}" > ${OCI_CLI_KEY_FILE}

          chmod 600 ${OCI_CONFIG_FILE}
          chmod 600 ${OCI_CLI_KEY_FILE}

          BASE_IMAGE_OCID=$(oci compute image list \
            --compartment-id ${{ env.COMPARTMENT_ID }} --all \
            --operating-system "Canonical Ubuntu" \
            --operating-system-version "24.04" | jq -r '.data[] | select(."display-name" | contains("Canonical-Ubuntu-24.04-aarch64")) | .id' | head -1)

          export PATH=$PATH:$HOME/bin && \
          export PACKER_PLUGIN_PATH=~/.config/packer/plugins && \
          cd ci/gha-runner-vm-oci && \
          PACKER_LOG=1 go run main.go \
            --base-image-ocid ${BASE_IMAGE_OCID} \
            --arch arm64

      - name: Upload image OCID
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-ocid-arm64
          path: /tmp/image_ocid

      - name: Upload image tag
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-tag-arm64
          path: /tmp/image_tag

  run-kind-with-arc:
    runs-on: ubuntu-latest
    needs: [build-x86, build-arm64]
    timeout-minutes: 15
    strategy:
      matrix:
        arch: [x86-64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Start kind cluster
        run: |
          cat <<EOF > kind-config.yaml
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
          - role: control-plane
            image: kindest/node:v1.35.0@sha256:452d707d4862f52530247495d180205e029056831160e22870e37e3f6c1ac31f
          - role: worker
            image: kindest/node:v1.35.0@sha256:452d707d4862f52530247495d180205e029056831160e22870e37e3f6c1ac31f
          EOF

          kind create cluster --config kind-config.yaml

          kubectl wait --for=condition=Ready nodes --all --timeout=120s

          helm install cncf-gha-controller \
            --namespace arc-systems \
            --create-namespace \
            --version 0.14.1 \
            oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set-controller

          kubectl wait --for=condition=Ready pod -l app.kubernetes.io/component=controller-manager --timeout=600s -n arc-systems

          kubectl create secret generic oci-api-key --from-literal=oci_api_key.pem="${{ secrets.OCI_CLI_KEY_CONTENT }}" -n arc-systems

          kubectl create secret generic github-arc-secret --from-literal=github_token=${{ secrets.GHA_PAT }} -n arc-systems

          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: oci-config
            namespace: arc-systems
          type: Opaque
          stringData:
            config: |
              [DEFAULT]
              user=${{ secrets.OCI_CLI_USER }}
              fingerprint=${{ secrets.OCI_CLI_FINGERPRINT }}
              tenancy=${{ secrets.OCI_CLI_TENANCY }}
              region=${{ secrets.OCI_CLI_REGION }}
              key_file=/oci/oci_api_key.pem
          EOF

          if [ "${{ matrix.arch }}" = "x86-64" ]; then
            MANIFEST_FILE=ci/cluster/oci/vm-runners/2cpu-8gb/install.yaml
          else
            MANIFEST_FILE=ci/cluster/oci/vm-runners/2cpu-8gb-arm64/install.yaml
          fi
          sed 's/oracle-vm-2cpu-8gb/oci-ci-test/g' $MANIFEST_FILE \
            | sed '/subnet-id/a \        - --running-environment=ci' \
            | sed '/nodeSelector/,+1d'| kubectl apply -f -

      - name: Wait for test-runner to complete
        run: |
          TARGET_JOB="test-runner (${{ matrix.arch }})"
          echo "Waiting for job: ${TARGET_JOB}"

          while true; do
            if ! RESULT=$(gh api repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs); then
              echo "WARNING: gh api call failed, retrying..."
              sleep 30
              continue
            fi

            JOB_STATUS=$(echo "$RESULT" | jq -r --arg job "$TARGET_JOB" '.jobs[] | select(.name == $job) | .status')
            JOB_CONCLUSION=$(echo "$RESULT" | jq -r --arg job "$TARGET_JOB" '.jobs[] | select(.name == $job) | .conclusion')

            if [ -z "$JOB_STATUS" ]; then
              echo "Job '${TARGET_JOB}' not found yet, waiting..."
              sleep 30
              continue
            fi

            if [ "$JOB_STATUS" = "completed" ]; then
              if [ "$JOB_CONCLUSION" = "failure" ]; then
                echo "ERROR: ${TARGET_JOB} failed"
                exit 1
              fi
              echo "${TARGET_JOB} completed successfully"
              break
            fi

            echo "${TARGET_JOB} status: ${JOB_STATUS}, waiting..."
            sleep 30
          done

          kind delete cluster
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}

  test-runner:
    strategy:
      matrix:
        arch: [x86-64, arm64]
    runs-on: oci-ci-test-${{ matrix.arch }}
    needs: [build-x86, build-arm64]
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Update APT
        run: |
          sudo apt-get update
          sudo apt-get install -y mc

      - name: Run uname to verify architecture
        run: |
          uname -a
          lsb_release -a
          cat /proc/cpuinfo

      - name: Run kind cluster
        run: ${{ github.workspace }}/.github/scripts/test_with_kind_cluster.sh

  release-arm-image:
    runs-on: ubuntu-latest
    needs: [run-kind-with-arc, test-runner]
    env:
      OS_NAME: ubuntu-24.04-arm64-gha-image
    steps:
      - name: Download image OCID
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: image-ocid-arm64

      - name: Install OCI CLI
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          pip-install: oci-cli

      - name: Release
        run: |
          IMAGE_ID=$(cat image_ocid)
          oci compute image update --image-id ${IMAGE_ID} --operating-system ${{ env.OS_NAME }} --display-name ${{ env.OS_NAME }}

  copy-image-to-regions:
    runs-on: ubuntu-latest
    needs: [run-kind-with-arc, test-runner]
    strategy:
      matrix:
        region: [us-phoenix-1, us-chicago-1]
    env:
      BUCKET_NAMESPACE: axtwf1hkrwcy
      BUCKET_NAME: bucket-20250428-1925
    steps:
      - name: Download Object Name
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: object-name-x86

      - name: Install OCI CLI
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          pip-install: oci-cli

      - name: Sync image to other regions
        run: |
          OBJECT_NAME=$(cat object_name)
          oci os object copy \
            --wait-for-state COMPLETED \
            --max-wait-seconds 3600 \
            --bucket-name ${{ env.BUCKET_NAME }} \
            --source-object-name ${OBJECT_NAME} \
            --destination-bucket ${{ env.BUCKET_NAME }} \
            --destination-region ${{ matrix.region }} \
            --destination-namespace ${{ env.BUCKET_NAMESPACE }}

  release-new-image:
    runs-on: ubuntu-latest
    needs: copy-image-to-regions
    env:
      OS_NAME: ubuntu-24.04-amd64-gha-image
    steps:
      - name: Download image OCID
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: image-ocid-x86

      - name: Install OCI CLI
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          pip-install: oci-cli

      - name: Release
        run: |
          IMAGE_ID=$(cat image_ocid)
          oci compute image update --image-id ${IMAGE_ID} --operating-system ${{ env.OS_NAME }} --display-name ${{ env.OS_NAME }}

  import-image-on-regions:
    runs-on: ubuntu-latest
    needs: release-new-image
    strategy:
      matrix:
        region: [us-ashburn-1, us-phoenix-1, us-chicago-1]
    env:
      OS_NAME: ubuntu-24.04-amd64-gha-image
      BUCKET_NAMESPACE: axtwf1hkrwcy
      BUCKET_NAME: bucket-20250428-1925
    steps:
      - name: Download Object Name
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: object-name-x86

      - name: Download image tag
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: image-tag-x86

      - name: Install OCI CLI
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          pip-install: oci-cli

      - name: Import Custom Image
        run: |
          set -euo pipefail
          OBJECT_NAME=$(cat object_name)
          IMAGE_TAG=$(cat image_tag)
          IMAGE_ID=$(oci compute image import from-object \
            --bucket-name ${{ env.BUCKET_NAME }} \
            --compartment-id ${{ env.COMPARTMENT_ID }} \
            --namespace ${{ env.BUCKET_NAMESPACE }} \
            --operating-system ${{ env.OS_NAME }} \
            --display-name ${{ env.OS_NAME }} \
            --name ${OBJECT_NAME} \
            --operating-system-version ${IMAGE_TAG} \
            --launch-mode PARAVIRTUALIZED \
            --region ${{ matrix.region }} \
            --query 'data.id' --raw-output)
          while true; do
            STATUS=$(oci compute image get --image-id ${IMAGE_ID} --region ${{ matrix.region }} --query 'data."lifecycle-state"' --raw-output)
            echo "Image import status: $STATUS"
            if [ "$STATUS" == "AVAILABLE" ]; then
              echo "Image import completed"
              break
            elif [ "$STATUS" == "FAILED" ]; then
              echo "Image import failed"
              exit 1
            else
              echo "Waiting for image import to complete..."
              sleep 30
            fi
          done
          echo "IMAGE_ID=${IMAGE_ID}" >> $GITHUB_ENV

      - name: Enable A10 shapes
        run: |
          set -euo pipefail
          export OCI_CONFIG_FILE="${{ github.workspace }}/.oci/config"
          export OCI_CLI_KEY_FILE="${{ github.workspace }}/.oci/oci_api_key.pem"
          mkdir -p ${{ github.workspace }}/.oci

          cat > ${OCI_CONFIG_FILE} << EOF
          [DEFAULT]
          user=${{ secrets.OCI_CLI_USER }}
          fingerprint=${{ secrets.OCI_CLI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_CLI_TENANCY }}
          region=${{ secrets.OCI_CLI_REGION }}
          key_file=${OCI_CLI_KEY_FILE}
          EOF

          echo "${{ secrets.OCI_CLI_KEY_CONTENT }}" > ${OCI_CLI_KEY_FILE}

          chmod 600 ${OCI_CONFIG_FILE}
          chmod 600 ${OCI_CLI_KEY_FILE}

          oci raw-request --http-method PUT \
            --config-file ${OCI_CONFIG_FILE} \
            --target-uri https://iaas.${{ matrix.region }}.oraclecloud.com/20160918/images/${IMAGE_ID}/shapes/VM.GPU.A10.1 \
            --request-body "{\"imageId\":\"${IMAGE_ID}\",\"shape\":\"VM.GPU.A10.1\"}"
          oci raw-request --http-method PUT \
            --config-file ${OCI_CONFIG_FILE} \
            --target-uri https://iaas.${{ matrix.region }}.oraclecloud.com/20160918/images/${IMAGE_ID}/shapes/VM.GPU.A10.2 \
            --request-body "{\"imageId\":\"${IMAGE_ID}\",\"shape\":\"VM.GPU.A10.2\"}"
