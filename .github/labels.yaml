ruleset:

##############################################################################
# Remove command rules
#
# Rules are executed in order, to be evaluated correctly removals rules need
# to be executed first.
##############################################################################

- name: remove-dd-triage
  kind: match
  spec:
    command: /remove-dd/triage
  actions:
  - kind: remove-label
    spec: 
      match: dd/{{ argv.0 }}

- name: remove-help
  kind: match
  spec:
   command: /remove-help
  actions:
  - kind: remove-label
    spec:
      match: help-wanted

- name: remove-init
  kind: match
  spec:
    command: /remove-init
  actions:
  - kind: remove-label
    spec: 
      match: init/{{ argv.0 }} 

- name: remove-kind
  kind: match
  spec:
    command: /remove-kind
  actions:
  - kind: remove-label
    spec: 
      match: kind/{{ argv.0 }}

- name: remove-level
  kind: match
  spec:
    command: /remove-level
  actions:
  - kind: remove-label
    spec: 
      match: level/{{ argv.0 }}

- name: remove-review
  kind: match
  spec:
    command: /remove-review
  actions:
  - kind: remove-label
    spec: 
      match: review/{{ argv.0 }}

- name: remove-sub
  kind: match
  spec:
    command: /remove-sub
  actions:
  - kind: remove-label
    spec:
      match: sub/{{ argv.0 }}

- name: remove-tag
  kind: match
  spec:
    command: /remove-tag
  actions:
  - kind: remove-label
    spec: 
      match: tag/{{ argv.0 }}

- name: test
  kind: filePath
  spec:
    matchPath: "utilities/labeler/*"
  actions:
  - kind: remove-label
    spec:
      match: needs-group
  - kind: apply-label
    spec:
      label: toc

# has to come before /toc otherwise it will try and match as "toc/{{argv.0}}"
- name: remove-toc-init
  kind: match
  spec:
    command: /remove-toc/initiative
  actions:
  - kind: remove-label
    spec:
      match: toc/initiative/{{ argv.0 }}

- name: remove-toc
  kind: match
  spec:
    command: /remove-toc
  actions:
  - kind: remove-label
    spec: 
      match: toc

- name: remove-triage
  kind: match
  spec:
   command: /remove-triage
  actions:
  - kind: remove-label
    spec:
      match: triage/{{ argv.0 }}

- name: remove-vote
  kind: match
  spec:
    command: /remove-vote
  actions:
  - kind: remove-label
    spec:
      match: vote/*

- name: remove-priority
  kind: match
  spec:
    command: /remove-priority
  actions:
  - kind: remove-label
    spec:
      match: priority/*

- name: remove-status
  kind: match
  spec:
    command: /remove-status
  actions:
  - kind: remove-label
    spec:
      match: status/*

- name: remove-area
  kind: match
  spec:
    command: /remove-area
  actions:
  - kind: remove-label
    spec:
      match: area/*


##############################################################################
# Label state rules & needs-<foo> rules
##############################################################################

- name: needs-triage
  kind: label
  spec:
    match: triage/*
    matchCondition: NOT
  actions:
  - kind: apply-label
    spec:
      label: needs-triage

- name: needs-kind
  kind: label
  spec:
    match: kind/*
    matchCondition: NOT
  actions:
  - kind: apply-label
    spec:
      label: needs-kind

- name: needs-group
  kind: label
  spec:
    match: "{toc,tag/*,sub/*}"
    matchCondition: NOT
  actions:
  - kind: apply-label
    spec:
      label: needs-group

- name: needs-priority
  kind: label
  spec:
    match: priority/*
    matchCondition: NOT
  actions:
  - kind: apply-label
    spec:
      label: needs-priority

- name: needs-area
  kind: label
  spec:
    match: area/*
    matchCondition: NOT
  actions:
  - kind: apply-label
    spec:
      label: needs-area

- name: needs-status
  kind: label
  spec:
    match: status/*
    matchCondition: NOT
  actions:
  - kind: apply-label
    spec:
      label: needs-status

- name: apply-kind
  kind: match
  spec:
    command: /kind
    rules:
    - matchList:
      - needs-kind
      - kind/automation
      - kind/bug
      - kind/chore
      - kind/dd
      - kind/docker
      - kind/docs
      - kind/enhancement
      - kind/external-gha
      - kind/github-actions
      - kind/go
      - kind/initiative
      - kind/meeting
      - kind/question
      - kind/review
      - kind/subproject
  actions:
  - kind: remove-label
    spec:
      match: needs-kind
  - kind: apply-label
    spec:
      label: kind/{{ argv.0 }}

- name: apply-triage
  kind: match
  spec:
    command: /triage
    rules:
    - matchList:
      - needs-triage
      - triage/valid
      - triage/needs-information
      - triage/duplicate
      - triage/not-planned
  actions:
  - kind: remove-label
    spec:
      match: needs-triage
  - kind: remove-label
    spec:
      match: triage/*
  - kind: apply-label
    spec:
      label: triage/{{ argv.0 }}


##############################################################################
# Group (toc/tag/sub) apply commands
##############################################################################

- name: apply-tag
  kind: match
  spec:
    command: /tag
    rules:
    - matchList:
      - needs-group
      - tag/developer-experience
      - tag/infrastructure
      - tag/operational-resilience
      - tag/security-and-compliance
      - tag/workloads-foundation
  actions:
  - kind: remove-label 
    spec:
      match: needs-group
  - kind: apply-label
    spec:
      label: tag/{{ argv.0 }} 

- name: apply-toc
  kind: match
  spec:
    command: /toc
    rules:
    - match: "toc"
  actions:
  - kind: remove-label
    spec:
      match: needs-group
  - kind: apply-label
    spec:
      label: toc

- name: apply-sub
  kind: match
  spec:
    command: /sub
    rules:
    - matchList:
      - needs-group
      - sub/contributor-strategy-and-advocacy
      - sub/mentoring
      - sub/project-reviews
  actions:
  - kind: remove-label
    spec:
      match: needs-group
  - kind: apply-label
    spec:
      label: sub/{{ argv.0 }}

- name: apply-priority
  kind: match
  spec:
    command: /priority
    rules:
    - matchList:
      - needs-priority
      - priority/critical
      - priority/high
      - priority/medium
      - priority/low
  actions:
  - kind: remove-label
    spec:
      match: needs-priority
  - kind: remove-label
    spec:
      match: priority/*
  - kind: apply-label
    spec:
      label: priority/{{ argv.0 }}

- name: apply-status
  kind: match
  spec:
    command: /status
    rules:
    - matchList:
      - needs-status
      - status/needs-review
      - status/blocked
      - status/in-progress
  actions:
  - kind: remove-label
    spec:
      match: needs-status
  - kind: remove-label
    spec:
      match: status/*
  - kind: apply-label
    spec:
      label: status/{{ argv.0 }}

- name: apply-area
  kind: match
  spec:
    command: /area
    rules:
    - matchList:
      - needs-area
      - area/ci
      - area/utilities
      - area/cloudrunners
      - area/dot-project
      - area/infrastructure
      - area/observability
      - area/ambassadors
      - area/kubestronaut
  actions:
  - kind: remove-label
    spec:
      match: needs-area
  - kind: remove-label
    spec:
      match: area/*
  - kind: apply-label
    spec:
      label: area/{{ argv.0 }}


##############################################################################
# DD commands
##############################################################################

# triage for DD only includes items that are 'blockers'. Any project that has a 
# complete app, submitted adopters, and has completed their security assessment
# is ready to be evaluated and dd/status/ready-for-review

- name: apply-dd-triage
  kind: match
  spec:
    command: /dd/triage
    rules:
    - matchList:
      - dd/triage/needs-triage
      - dd/triage/needs-adopters
      - dd/triage/incomplete-application
      - dd/triage/needs-security-assessment
  actions:
  - kind: remove-label
    spec:
      match: dd/triage/needs-triage
  - kind: apply-label
    spec:
      label: dd/triage/{{ argv.0 }}

# when ready for assignment, clear previous triage state labels and status
- name: apply-dd-ready
  kind: match
  spec:
    command: /dd/status
    rules:
    - match: ready-for-assignment
  actions:
  - kind: remove-label
    spec:
      match: dd/triage/*
  - kind: apply-label
    spec:
      label: dd/status/ready-for-assignment
  
- name: apply-dd-status
  kind: match
  spec:
    command: /dd/status
    rules:
    - matchList:
      - dd/status/ready-for-assignment
      - dd/status/in-progress
      - dd/status/in-comment-period
      - dd/status/in-voting
      - dd/status/complete
      - dd/status/waiting
  actions:
  - kind: remove-label
    spec:
      match: dd/triage/*
  - kind: remove-label
    spec:
      match: dd/status/*
  - kind: apply-label
    spec:
      label: dd/adopters/not-started
  - kind: apply-label
    spec:
      label: dd/gov-review/not-started
  - kind: apply-label
    spec:
      label: dd/tech-review/not-started
  - kind: apply-label
    spec:
      label: dd/sec-review/not-started
  - kind: apply-label
    spec:
      label: dd/status/{{ argv.0 }}
    
- name: apply-dd-adopters
  kind: match
  spec:
    command: /dd/adopters
    rules:
    - matchList:
      - dd/adopters/not-started
      - dd/adopters/in-progress
      - dd/adopters/complete
  actions:
  - kind: remove-label
    spec:
      match: dd/adopters/*
  - kind: apply-label
    spec:
      label: dd/adopters/{{ argv.0 }}

- name: apply-dd-gov-review
  kind: match
  spec:
    command: /dd/gov-review
    rules:
    - matchList:
      - dd/gov-review/not-started
      - dd/gov-review/in-progress
      - dd/gov-review/complete
  actions:
  - kind: remove-label
    spec:
      match: dd/gov-review/*
  - kind: apply-label
    spec:
      label: dd/gov-review/{{ argv.0 }}   

- name: apply-dd-tech-review
  kind: match
  spec:
    command: /dd/tech-review
    rules:
    - matchList:
      - dd/tech-review/not-started
      - dd/tech-review/in-progress
      - dd/tech-review/complete
  actions:
  - kind: remove-label
    spec:
      match: dd/tech-review/*
  - kind: apply-label
    spec:
      label: dd/tech-review/{{ argv.0 }}

- name: apply-dd-sec-review
  kind: match
  spec:
    command: /dd/sec-review
    rules:
    - matchList:
      - dd/sec-review/not-started
      - dd/sec-review/in-progress
      - dd/sec-review/complete
  actions:
  - kind: remove-label
    spec:
      match: dd/sec-review/*
  - kind: apply-label
    spec:
      label: dd/sec-review/{{ argv.0 }} 


##############################################################################
# Initiatives
##############################################################################

- name: apply-toc-init
  kind: match
  spec:
    command: /toc/initiative
    rules:
    - matchList:
      - toc/initiative/ai
  actions:
  - kind: apply-label
    spec:
      label: toc/initiative/{{ argv.0 }}


- name: apply-init-lifecycle
  kind: match
  spec:
    command: /init
    rules:
    - matchList:
      - init/not-started
      - init/in-progress
      - init/complete
      - init/stale
  actions:
  - kind: remove-label
    spec:
      match: init/*
  - kind: apply-label
    spec:
      label: init/{{ argv.0 }}


##############################################################################
# Vote / Election Commands
##############################################################################

- name: vote-open-closed
  kind: match
  spec:
    command: /vote
    rules:
    - matchList:
      - vote/open
      - vote/closed
  actions:
  - kind: remove-label
    spec:
      match: vote/open
  - kind: remove-label
    spec:
      match: vote/closed
  - kind: apply-label
    spec:
      label: vote/{{ argv.0 }}

- name: vote-nomination
  kind: match
  spec:
    command: /vote
    rules:
    - match: nomination
  actions:
  - kind: apply-label
    spec:
      label: vote/nomination


##############################################################################
# Misc Commands
##############################################################################

- name: help
  kind: match
  spec:
    command: /help
    rules:
    - match: ""
  actions:
  - kind: apply-label
    spec:
      label: help-wanted


##############################################################################
# filepath rules
# These need to come first as they are strict on applying labels by path
##############################################################################


- name: charter
  kind: filePath
  spec:
    matchPath: "tags/*/charter.md"
  actions:
  - kind: remove-label
    spec:
      match: needs-group
  - kind: apply-label
    spec:
      label: toc
- name: tag-developer-experience-dir
  kind: filePath
  spec:
    matchPath: "tags/tag-developer-experience/*"
  actions:
  - kind: remove-label
    spec:
      match: needs-group
  - kind: apply-label
    spec:
      label: tag/developer-experience
- name: tag-infrastructure-dir
  kind: filePath
  spec:
    matchPath: "tags/tag-infrastructure/*"
  actions:
  - kind: remove-label
    spec:
      match: needs-group
  - kind: apply-label
    spec:
      label: tag/infrastructure
- name: tag-operational-resilience-dir
  kind: filePath
  spec:
    matchPath: "tags/tag-operational-resilience/*"
  actions:
  - kind: remove-label
    spec:
      match: needs-group
  - kind: apply-label
    spec:
      label: tag/operational-resilience
- name: tag-security-and-compliance-dir
  kind: filePath
  spec:
    matchPath: "tags/tag-security-and-compliance/*"
  actions:
  - kind: remove-label
    spec:
      match: needs-group
  - kind: apply-label
    spec:
      label: tag/security-and-compliance
- name: tag-workloads-foundation-dir
  kind: filePath
  spec:
    matchPath: "tags/tag-workloads-foundation/*"
  actions:
  - kind: remove-label
    spec:
      match: needs-group
  - kind: apply-label
    spec:
      label: tag/workloads-foundation
- name: sub-contrib-strat-dir
  kind: filePath
  spec:
    matchPath: "toc_subprojects/contributor-strategy-and-advocacy/*"
  actions:
  - kind: remove-label
    spec:
      match: needs-group
